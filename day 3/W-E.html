<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Movie Website Layout </title>
        <style>
            *{
                background-color: rgb(246,246,246);
            }
            .container{
                width: 90%;
                margin: auto;
                display: flex;
                margin-bottom: 25px;
            }
            .card{
                width: 30%;
                margin: auto;
                text-align: center;
                border: 1px solid rgb(230,229,229);
                padding-bottom: 20px;
            }
            .card_img{
                width: 100%;
            }
            .click{
                background-color: #81D4FA;
                width: 90px;
                height: 30px;
                border: 0px;
            }

        </style>
    </head>
    <body>
        <!-- 1 -->
        <div class="container">
            <div class="card">
                <img class="card_img" src="https://assetscdn1.paytm.com/images/cinema/Doctor-Strange--In-The-Multiverse-Of-Madness-r-705x750-36f0e140-b752-11ec-a762-319bdb0970f2.jpg" alt="Doctor Strange 2">
                <h2>Doctor Strange 2</h2>
                <p>Rating:- 4.5</p>
                <button class="click">Book now</button>
            </div>
            <div class="card">
                <img class="card_img" src="https://assetscdn1.paytm.com/images/cinema/bb2--705x750-cbc15240-8a94-11ec-8efd-6d205f33f529.jpg" alt="Bhool Bhulaiyaa 2">
                <h2>Bhool Bhulaiyaa 2</h2>
                <p>Rating:- 4.5</p>
                <button class="click">Book now</button>
            </div>
            <div class="card">
                <img class="card_img" src="https://assetscdn1.paytm.com/images/cinema/Jayeshbhai-Jordaar---705x750-660c01c0-cf7c-11ec-98b3-41c37f260d1c.jpg" alt="Jayeshbhai Jordaar">
                <h2>Jayeshbhai Jordaar</h2>
                <p>Rating:- 4.5</p>
                <button class="click">Book now</button>
            </div>
        </div>
        <!-- 2 -->
        <div class="container">
            <div class="card">
                <img class="card_img" src="https://assetscdn1.paytm.com/images/cinema/Jurassic-World--Dominion-705x750-b554ee90-cd51-11ec-8d22-2363945d80ef.jpg" alt="Jurasic World">
                <h2>Jurasic World</h2>
                <p>Rating:- 4.5</p>
                <button class="click">Book now</button>
            </div>
            <div class="card">
                <img class="card_img" src=" https://assetscdn1.paytm.com/images/cinema/KGF-705x750-76008750-b6fd-11ec-9639-8322852eadd4.jpg" alt="KGF2">
                <h2>KGF2</h2>
                <p>Rating:- 4.5</p>
                <button class="click">Book now</button>
            </div>
            <div class="card">
                <img class="card_img" src="https://assetscdn1.paytm.com/images/cinema/RRR-North-705x750-fd78d9c0-693d-11ec-bbcd-5d122dc4018b.jpg" alt="RRR">
                <h2>RRR</h2>
                <p>Rating:- 4.5</p>
                <button class="click">Book now</button>
            </div>
        </div>
        
    </body>
</html>
